name: MindDiaryApp
options:
  deploymentTarget:
    iOS: "17.0"
targets:
  MindDiaryApp:
    type: application
    platform: iOS
    bundleId: com.slyeee.maumon2026
    sources:
      - path: APIService.swift
      - path: DataSeeder.swift
      - path: .
        excludes:
          - Package.swift
          - Package.resolved
          - project.yml
          - create_appicon.py
          - create_assets.py
          - make_icons.py
          - .build
          - .github
          - .agent
    info:
      path: Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        CFBundleDisplayName: maumON
        NSSpeechRecognitionUsageDescription: "일기 작성 시 음성으로 입력하기 위해 음성 인식 권한이 필요합니다."
        NSMicrophoneUsageDescription: "음성 일기 작성을 위해 마이크 접근 권한이 필요합니다."
    entitlements:
      path: MindDiaryApp.entitlements
    scheme:
      storeKitConfiguration: MindBridgeSubscription.storekit
      properties:
        CFBundleDisplayName: "maumON"
        CFBundleName: "maumON"
        UILaunchStoryboardName: "LaunchScreen"
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXRandom
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXOptimizers
      - package: mlx-swift
        product: MLXFFT
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXLLM
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: MetalPerformanceShaders.framework
      - sdk: Accelerate.framework
      - sdk: Foundation.framework
      - sdk: UIKit.framework
      - sdk: SwiftUI.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreAudio.framework
      - sdk: AVFoundation.framework
    settings:
      EXCLUDED_ARCHS[sdk=iphonesimulator*]: "x86_64"
      Check Pods Manifest.lock: false
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.slyeee.maumon2026
      ENABLE_BITCODE: NO
      LD_RUNPATH_SEARCH_PATHS: ["$(inherited)", "@executable_path/Frameworks"]
      OTHER_LDFLAGS:
        [
          "$(inherited)",
          "-Wl,-ld_classic",
          "-framework",
          "Metal",
          "-framework",
          "MetalPerformanceShaders",
          "-framework",
          "Accelerate",
          "-framework",
          "Foundation",
          "-lc++",
          "-ObjC",
        ]
      SWIFT_VERSION: 5.0
      TARGETED_DEVICE_FAMILY: "1"
      CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
      CLANG_CXX_LIBRARY: "libc++"
      ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift.git
    from: 0.10.0
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    branch: main
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.0.0
