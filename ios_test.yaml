appId: com.slyeee.maumon2026
---
- launchApp:
    clearState: false
- tapOn:
    text: "허용"
    optional: true
- extendedWaitUntil:
    visible: "캘린더"
    timeout: 30000
- tapOn:
    id: "SettingsMenuButton"
- extendedWaitUntil:
    visible: "마음 브릿지 열기"
    timeout: 10000
- tapOn: "마음 브릿지 열기"
- extendedWaitUntil:
    visible: "추가"
    timeout: 10000
# "추가" 텍스트 클릭 (새 수신자 추가 버튼 등)
- tapOn: "추가"
- extendedWaitUntil:
    visible: "수신자 정보"
    timeout: 5000
- tapOn: "이름 (예: 엄마, 김OO 상담사)"
- inputText: "APP_TEST"
- pressKey: Enter
- swipe:
    direction: DOWN
    duration: 500
# Modal 내비게이션 바 우측 상단의 "추가" 버튼 좌표 탭
- tapOn:
    point: 90%, 10%
- extendedWaitUntil:
    visible: "APP_TEST"
    timeout: 10000
- assertVisible: "APP_TEST"
- tapOn: "관리"
- assertVisible: "APP_TEST에게 공유할 정보"
- tapOn: "닫기"
